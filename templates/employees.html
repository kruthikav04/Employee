<!DOCTYPE html>
<html>

<head>
<title>Employees</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>Add Employee</h2>

<form method="POST" action="/add_employee">

Name:
<input type="text" name="emp_name" required>

Team:
<input type="text" name="team" required>

Date of Joining:
<input type="date" name="date_of_joining" required>

<button type="submit">Add Employee</button>

</form>

<br>

<h2>Employee List</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Team</th>
<th>Date of Joining</th>
<th>Actions</th>
</tr>

{% for emp in employees %}

<tr>
<td>{{ emp.emp_id }}</td>
<td>{{ emp.emp_name }}</td>
<td>{{ emp.team }}</td>
<td>{{ emp.date_of_joining }}</td>

<td>

<a href="/edit/{{ emp.emp_id }}">Edit</a>

<a href="/delete/{{ emp.emp_id }}" onclick="return confirm('Delete employee?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>

</html>
